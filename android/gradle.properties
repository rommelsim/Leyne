# Heap capped at 4G: GitHub-hosted runners have ~7G total RAM, so the old 8G
# request risked an OOM-killed Gradle daemon (cryptic CI failures). 4G is
# ample for a Flutter Android build and harmless on a dev machine.
org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false

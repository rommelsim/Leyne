name: CI

# Verifies every push and pull request: static analysis + the widget test
# suite, plus a build of both the Android and iOS apps. Catches regressions
# on both platforms before they reach a device.
on:
  push:
  pull_request:
  workflow_dispatch:

# A newer push to the same branch cancels an in-flight run — saves runner
# minutes, notably the 10x-billed macOS runner used for the iOS build.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Analyze · test · Android build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      # Debug APK — verifies the Android build compiles. The LTA key has a
      # baked-in fallback (lib/data/lta_config.dart), so no secrets needed.
      - run: flutter build apk --debug

  ios:
    name: iOS build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      # --no-codesign skips signing certs; this only confirms the iOS app
      # compiles. analyze + test already ran on the Android job (they're
      # platform-agnostic), so this job stays lean on the costly runner.
      - run: flutter build ios --no-codesign --debug

  ios-native:
    name: iOS native build (SwiftUI app + widgets)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # The active iOS product is the native SwiftUI app under ios-native/,
      # NOT the Flutter wrapper the `ios` job builds. Nothing else compiles
      # this target, so a Swift error — or a broken widget extension / Live
      # Activity — is invisible until someone opens Xcode. This compiles the
      # app + LeyneWidgets extension on every push. No signing needed.
      - name: Build ios-native (app + LeyneWidgets extension)
        run: |
          xcodebuild build \
            -project ios-native/Leyne.xcodeproj \
            -scheme Leyne \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO

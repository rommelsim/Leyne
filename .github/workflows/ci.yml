name: CI

# Verifies every push and pull request: static analysis + the Dart test suite
# (Android job) and the Swift XCTest suite (ios-native job), plus a build of
# the Android, Flutter-iOS, and native-iOS apps. Catches regressions on both
# platforms before they reach a device.
on:
  push:
  pull_request:
  workflow_dispatch:

# A newer push to the same branch cancels an in-flight run — saves runner
# minutes, notably the 10x-billed macOS runner used for the iOS build.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Analyze · test · Android build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          # Pinned so a stable-channel bump can't silently change compileSdk /
          # Dart version / plugin compat out from under CI. Bump in lockstep
          # with the local Flutter when upgrading.
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      # Release AAB — verifies the actual shipping artifact and the release /
      # AOT code path (a debug APK skips AOT, so AOT-only failures slip past).
      # The LTA key has a baked-in fallback (lib/data/lta_config.dart), and the
      # release build falls back to debug signing when key.properties is absent
      # (it is, in CI), so no secrets are needed to produce a verifiable bundle.
      - run: flutter build appbundle --release

  ios:
    name: iOS build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # The app compiles iOS 26-only APIs (Liquid Glass, tabViewBottomAccessory)
      # behind #available guards — these still need the iOS 26 SDK at *compile*
      # time, which ships with Xcode 26. The runner default Xcode lacks it, so
      # the build fails without this. latest-stable picks the newest Xcode on
      # the image; if it's still < 26, bump runs-on to an image that carries it.
      - name: Select Xcode (iOS 26 SDK)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          # Pinned so a stable-channel bump can't silently change compileSdk /
          # Dart version / plugin compat out from under CI. Bump in lockstep
          # with the local Flutter when upgrading.
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - run: flutter pub get
      # --no-codesign skips signing certs; this only confirms the iOS app
      # compiles. analyze + test already ran on the Android job (they're
      # platform-agnostic), so this job stays lean on the costly runner.
      - run: flutter build ios --no-codesign --debug

  ios-native:
    name: iOS native build + unit tests (SwiftUI app + widgets)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # iOS 26 SDK (Xcode 26) is required to compile the app's #available(iOS 26)
      # APIs — Liquid Glass, tabViewBottomAccessory, the V2/ surfaces. The runner
      # default Xcode lacks it. latest-stable picks the newest Xcode on the image;
      # if still < 26, bump runs-on to an image that carries Xcode 26.
      - name: Select Xcode (iOS 26 SDK)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      # Running the test action needs a concrete, booted simulator. Device names
      # track the SDK (iPhone 16 on Xcode 16, iPhone 17 on Xcode 26), so resolve
      # a UDID dynamically rather than pinning a device that may not exist.
      - name: Select an iPhone simulator
        id: sim
        run: |
          UDID=$(xcrun simctl list devices available --json \
            | python3 -c "import sys,json;d=json.load(sys.stdin)['devices'];print(next(dev['udid'] for rt in d.values() for dev in rt if 'iPhone' in dev['name']))")
          echo "Using simulator $UDID"
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"
          xcrun simctl boot "$UDID" || true

      # The active iOS product is the native SwiftUI app under ios-native/, NOT
      # the Flutter wrapper the `ios` job builds. `xcodebuild test` compiles the
      # app + embedded LeyneWidgets extension AND the LeyneTests target, then
      # runs the unit suite (BusProgress route-progress math, ETA rounding,
      # LTA parsing, search, pins). The Live-LTA integration tests XCTSkip when
      # the network/key is unavailable, so they never fail the run. No signing.
      - name: Build & test ios-native (app + LeyneWidgets + LeyneTests)
        run: |
          xcodebuild test \
            -project ios-native/Leyne.xcodeproj \
            -scheme Leyne \
            -destination "id=${{ steps.sim.outputs.udid }}" \
            CODE_SIGNING_ALLOWED=NO
